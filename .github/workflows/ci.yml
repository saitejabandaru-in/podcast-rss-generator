name: Python Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting & Formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black flake8 pytest

      - name: Check Formatting (Black)
        run: black --check . --exclude '/(\.git|\.venv)/' || true

      - name: Lint with Ruff
        run: ruff check . || true

      - name: Run Tests (Pytest)
        run: pytest || echo "No tests configured yet."
